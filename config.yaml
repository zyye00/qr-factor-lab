project:
  name: qr-factor-lab

data:
  start_date: "20180101"
  end_date: null
  universe: "CSI500"
  benchmark: "000905"
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  cache_dir: "data/cache"

features:
  factors:
    - reversal_5
    - momentum_20
    - low_volatility_20
    - turnover_change_20
    - liquidity_20

labels:
  horizons:
    - 5
    - 20
  use_excess_return: true

preprocess:
  min_history_days: 120
  winsorize_lower: 0.01
  winsorize_upper: 0.99
  min_amount: 10000000

backtest:
  rebalance: "W"
  n_quantiles: 5
  weight_method: "equal"

costs:
  rates_bps:
    - 10
    - 20
    - 30

bootstrap:
  n_samples: 1000
  confidence_level: 0.95
  random_seed: 42
